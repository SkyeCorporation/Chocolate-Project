<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rem AI Agent — Chocolate</title>
<style>
:root{--bg:#080e1a;--surf:#08111f;--surf2:#0c1828;--bord:#102035;--acc:#74a8d4;--text:#c0d5e8;--muted:#425c7a;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bord);background:var(--surf);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.header-left a{color:var(--acc);font-size:0.8rem;text-decoration:none;display:flex;align-items:center;gap:4px;opacity:.8}
.header-left a:hover{opacity:1}
.htitle{font-weight:700;font-size:0.9rem;color:var(--acc)}
.header-right{display:flex;gap:8px}
.hbtn{padding:6px 14px;border-radius:7px;border:1px solid var(--bord);background:var(--surf2);color:var(--text);font-size:0.78rem;cursor:pointer;text-decoration:none;transition:.2s}
.hbtn:hover{border-color:var(--acc);color:var(--acc)}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:75%;padding:11px 15px;border-radius:var(--r);font-size:0.88rem;line-height:1.6;white-space:pre-wrap}
.msg.user{background:var(--acc);color:var(--bg);align-self:flex-end;font-weight:500}
.msg.ai{background:var(--surf2);color:var(--text);align-self:flex-start;border:1px solid var(--bord)}
.msg.ai.loading{color:var(--muted);font-style:italic}
.input-area{padding:14px 20px;border-top:1px solid var(--bord);background:var(--surf);display:flex;gap:10px;flex-shrink:0}
.input-box{flex:1;background:var(--surf2);border:1px solid var(--bord);color:var(--text);border-radius:var(--r);padding:10px 14px;font-size:0.88rem;outline:none;resize:none;font-family:inherit;min-height:42px;max-height:120px}
.input-box:focus{border-color:var(--acc)}
.send-btn{background:var(--acc);color:var(--bg);border:none;border-radius:var(--r);padding:0 18px;font-weight:700;font-size:0.85rem;cursor:pointer;flex-shrink:0;transition:.2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a href="http://localhost:5000"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Dashboard</a>
    <span style="color:var(--bord)">|</span>
    <span class="htitle">Rem · OpenAI</span>
  </div>
  <div class="header-right">
    <a class="hbtn" href="http://localhost:5000/agent" target="_blank">Amagi</a>
    <a class="hbtn" href="http://localhost:3003" target="_blank">Shary</a>
  </div>
</div>
<div class="chat" id="chat">
  <div class="msg ai">Selamat datang, Tuan. Saya Rem, siap melayani dengan sepenuh hati.</div>
</div>
<div class="input-area">
  <textarea class="input-box" id="input" placeholder="Ketik pesan..." rows="1"></textarea>
  <button class="send-btn" id="send">Kirim</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const history = [];

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

async function sendMsg() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  send.disabled = true;
  addMsg(msg, 'user');
  const msgs = history.map(h => ({ role: h.role, content: h.content }));
  history.push({ role: 'user', content: msg });
  const aiEl = addMsg('Sedang mengetik...', 'ai loading');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: msgs })
    });
    const d = await r.json();
    const reply = d.reply || d.error || 'Terjadi kesalahan.';
    aiEl.textContent = reply;
    aiEl.className = 'msg ai';
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    aiEl.textContent = 'Error: ' + e.message;
    aiEl.className = 'msg ai';
  }
  send.disabled = false;
  input.focus();
}

send.addEventListener('click', sendMsg);
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
</script>
</body>
</html>
